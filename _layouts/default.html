<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    {% seo %}

    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">

    <script>
      document.documentElement.classList.add('js');
    </script>
  </head>

  <body>

    <!-- Sticky Header -->
    <header class="site-header sticky">
      <div class="container-lg header-inner">
        <div>
          <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
          <div class="site-tagline">{{ site.description }}</div>
        </div>

        <button id="themeToggle" class="theme-toggle">☾</button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="container-lg fade-in">
      {{ content }}
    </main>

    <!-- Footer -->
    <footer class="site-footer">
      <div class="container-lg">

        <div style="margin-bottom:10px;">
          {{ site.name }} · {{ site.url }}
        </div>

 <div style="display:flex; flex-wrap:wrap; gap:12px;">
  <a href="https://www.churchofjesuschrist.org/" target="_blank" rel="noopener">
    Church
  </a>

  <a href="https://mydsd.davis.k12.ut.us/" target="_blank" rel="noopener">
    MyDSD
  </a>

  <a href="https://www.davis.k12.ut.us/" target="_blank" rel="noopener">
    Davis School District
  </a>
</div>

      </div>
    </footer>

    <!-- Theme Toggle Script -->
    <script>
      const btn = document.getElementById('themeToggle');
      const root = document.documentElement;

      const saved = localStorage.getItem('theme');
      if (saved) root.setAttribute('data-theme', saved);

      btn.addEventListener('click', () => {
        const current = root.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        root.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
      });
    </script>

  </body>
</html>
